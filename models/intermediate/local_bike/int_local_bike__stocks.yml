version: 2

models:
  - name: int_local_bike__stocks
    description: >
      Modèle intermédiaire fournissant la vision stock par magasin et par produit.
      Combine les données de stocks, les informations produits et magasins ainsi que
      les volumes de ventes historiques 
      Grain : une ligne = un produit dans un magasin.

    columns:
      - name: store_id
        description: Identifiant du magasin.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__stores')
                field: store_id

      - name: product_id
        description: Identifiant du produit.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__products')
                field: product_id

      - name: store_name
        description: Nom du magasin.

      - name: store_city
        description: Ville du magasin.

      - name: store_state
        description: Région/État du magasin.

      - name: product_name
        description: Nom du produit.

      - name: brand_name
        description: Marque du produit.

      - name: category_name
        description: Catégorie du produit.

      - name: model_year
        description: Année du modèle.

      - name: product_price
        description: Prix catalogue du produit.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0


      - name: current_stock_qty
        description: Quantité actuelle en stock dans le magasin.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0

      - name: inventory_value
        description: Valeur du stock = quantité × prix catalogue.
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0


      - name: total_qty_sold
        description: Quantité totale vendue dans ce magasin (NULL si jamais vendu).

      - name: total_orders
        description: Nombre total de commandes contenant le produit dans ce magasin.

      - name: first_sale_date
        description: Première date de vente dans ce magasin.

      - name: last_sale_date
        description: Dernière date de vente dans ce magasin.


      - name: is_out_of_stock
        description: TRUE si quantité stock = 0.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: has_never_sold
        description: TRUE si le produit n’a jamais été vendu dans ce magasin.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

