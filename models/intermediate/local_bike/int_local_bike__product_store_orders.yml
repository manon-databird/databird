  
version: 2

models:

  - name: int_local_bike__product_store_orders
    description: >
      Modèle agrégeant les performances de vente par produit et par magasin.
      Utilisé notamment pour le calcul du stock snapshot (has_never_sold par store).
      Grain : 1 ligne par (product_id, store_id).
      Source : int_local_bike__fct_order_items.
     
    columns:
      - name: product_id
        description: Identifiant du produit (partie de la clé primaire composite).
        tests:
          - not_null

      - name: total_orders
        description: Nombre de commandes distinctes ayant inclus ce produit dans ce magasin.

      - name: total_line_items
        description: Nombre total de lignes de commande pour ce produit dans ce magasin.

      - name: total_quantity_sold
        description: Quantité totale vendue pour ce produit dans ce magasin.

      - name: total_gross_revenue
        description: Revenu brut total pour ce produit dans ce magasin (avant remises).

      - name: total_net_revenue
        description: Revenu net total pour ce produit dans ce magasin (après remises).

      - name: total_discount_amount
        description: Montant total des remises pour ce produit dans ce magasin.

      - name: avg_revenue_per_line
        description: Revenu net moyen par ligne de commande.

      - name: avg_selling_price
        description: Prix de vente moyen constaté dans ce magasin.

      - name: min_selling_price
        description: Prix de vente minimum constaté dans ce magasin.

      - name: max_selling_price
        description: Prix de vente maximum constaté dans ce magasin.

      - name: avg_discount_rate
        description: Taux de remise moyen dans ce magasin (entre 0 et 1).

      - name: first_sale_date
        description: Date de la première vente de ce produit dans ce magasin.

      - name: last_sale_date
        description: Date de la dernière vente de ce produit dans ce magasin.

      - name: sales_period_days
        description: Nombre de jours entre la première et la dernière vente dans ce magasin.